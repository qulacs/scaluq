name: Issue:Feature
description: New feature request in scaluq
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Please write in English or Japanese. (英語または日本語で記入してください。)

  - type: textarea
    id: description
    attributes:
      label: Feature description (機能を説明してください。)
      description: provide a clear and concise description of the feature.
    validations:
      required: true

  - type: markdown
    attributes:
      value: "---"

  - type: textarea
    id: motivation
    attributes:
      label: Motivation / Purpose (動機や目的を記入してください。)
      description: Why is this feature needed? What problem does it solve?
    validations:
      required: true

  - type: markdown
    attributes:
      value: "---"

  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: Describe how this feature would be used.
    validations:
      required: false

  - type: markdown
    attributes:
      value: "---"

  - type: textarea
    id: alternative
    attributes:
      label: Alternatives considered
      description: Are there existing workarounds or alternative solutions?
    validations:
      required: false

  - type: markdown
    attributes:
      value: "---"


  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context.
    validations:
      required: false
