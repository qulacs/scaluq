name: Issue:Bug Report
description: Report a bug or problem in scaluq
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Please write in English or Japanese. (英語または日本語で記入してください。)  

  - type: textarea
    id: description
    attributes:
      label: Describe the bug (バグの説明をしてください。)
      description: A clear and concise description of the bug.
    validations:
      required: true 

  - type: markdown
    attributes:
      value: "---"


  - type: markdown
    attributes:
      value: Explain how to reproduce the bug or problem (バグの再現手順を記載してください。)

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Describe the steps to reproduce the bug.
      placeholder: "1. Run ...\n 2. Execute ...\n 3. Observe ..."
    validations:
      required: true

  - type: textarea
    id: code_cpp
    attributes:
      label: c++ code (if applicable)
      description: Paste c++ code here.
      render: c++
    validations:
      required: false

  - type: textarea
    id: code_python
    attributes:
      label: python code (if applicable)
      description: Paste python code here.
      render: python
    validations:
      required: false

  - type: textarea
    id: log
    attributes:
      label: log
      description: Paste long log.
      render: shell
    validations:
      required: false

  - type: markdown
    attributes:
      value: "---"

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior (予期している動作について説明してください。)
      description: describe expected behavior.
    validations:
      required: false

  - type: markdown
    attributes:
      value: "---"

  - type: textarea
    id: version
    attributes:
      label: Version
      description: What version of the project are you use?
      placeholder: e.g., v1.2.0 or commit hash
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Provide details of your environment.
      placeholder: "OS: ...\n Compiler: ...\n Python version: ...\n Library version: ..."
    validations:
      required: false 
