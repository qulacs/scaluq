name: Wheel build (PR)

on:
  pull_request:

jobs:
  check-changed:
    name: Check Changed Files
    runs-on: ubuntu-24.04
    outputs:
      any_changed: ${{ steps.check.outputs.any_changed }}
    steps:
      - uses: actions/checkout@v6

      - name: Check relevant files
        id: check
        uses: tj-actions/changed-files@v47.0.1
        with:
          files: |
            include/**
            src/**
            cmake/**
            CMakeLists.txt
            python/**
            pyproject.toml

  wheel-build:
    name: Python wheel build
    needs: [check-changed]
    if: ${{ needs.check-changed.outputs.any_changed == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: "linux"
            arch: "x86_64"
            runs-on: "ubuntu-24.04"
            cibw-os-arch: "manylinux_x86_64"
            cibw-python: "cp314"
          - os: "macos"
            arch: "x86_64"
            runs-on: "macos-15-intel"
            cibw-os-arch: "macosx_x86_64"
            cibw-python: "cp314"
          - os: "macos"
            arch: "arm64"
            runs-on: "macos-15"
            cibw-os-arch: "macosx_arm64"
            cibw-python: "cp314"
    runs-on: ${{ matrix.runs-on }}
    env:
      CMAKE_C_COMPILER: ${{ matrix.runs-on == 'macos-15-intel' && '/usr/local/opt/ccache/libexec/gcc-15' || (matrix.runs-on == 'macos-15' && '/opt/homebrew/opt/ccache/libexec/gcc-15' || '/usr/lib/ccache/gcc') }}
      CMAKE_CXX_COMPILER: ${{ matrix.runs-on == 'macos-15-intel' && '/usr/local/opt/ccache/libexec/g++-15' || (matrix.runs-on == 'macos-15' && '/opt/homebrew/opt/ccache/libexec/g++-15' || '/usr/lib/ccache/g++') }}
      SCALUQ_CPU_NATIVE: 'OFF'
      CIBW_ENVIRONMENT: SCALUQ_FLOAT32=OFF SCALUQ_FLOAT64=ON
      CIBW_ARCHS: ${{ matrix.arch }}
      CIBW_BUILD: ${{ matrix.cibw-python }}-${{ matrix.cibw-os-arch }}
      CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
      CIBW_MANYLINUX_AARCH64_IMAGE: manylinux_2_28
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.os == 'macos' && '15.0' || '' }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2.20
        with:
          key: "${{ matrix.os }}-${{ matrix.arch }}-${{ matrix.runs-on }}"
          save: false
          verbose: 2

      - name: Install Python dependencies
        run: python -m pip install cibuildwheel

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheels

  wheel-build-passed:
    name: Wheel Build Passed
    needs: [check-changed, wheel-build]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: All checks passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            exit 1
          fi
