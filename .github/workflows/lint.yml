name: Lint

on:
  push:
    paths:
      - ".github/**/*.yml"

jobs:
  lint:
    name: Check YAML
    runs-on: "ubuntu-24.04"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yamllint
        run: sudo apt-get update && sudo apt-get install -y yamllint

      - name: Running yamllint
        run: |
          yamllint -d "{extends: default, rules: {line-length: disable, document-start: disable, truthy: disable, comments-indentation: disable}}" .github
