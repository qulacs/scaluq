name: Format

on:
  merge_group:
  push:
    paths-ignore:
      - ".devcontainer/**"
      - ".vscode/**"
      - "doc/**"
      - "*.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/workflows/lint.yml"

jobs:
  check-format:
    name: Check Format
    runs-on: "ubuntu-24.04"
    steps:
      - uses: actions/checkout@v4

      - name: Setup cmake
        uses: lukka/get-cmake@latest

      - name: Install Ninja
        run: sudo apt install ninja-build

      - name: Configure
        run: |
          script/configure

      - name: Check format
        run: |
          ninja -C build format
          diff=$(git diff)
          echo -n "$diff"
          test "$(echo -n "$diff" | wc -l) -eq 0"

  format-check-passed:
    name: Format Check Passed
    needs: [check-format]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: All checks passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            exit 1
          fi
