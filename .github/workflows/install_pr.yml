name: Install to System (PR)

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-changed:
    name: Check Changed Files
    runs-on: ubuntu-24.04
    outputs:
      any_changed: ${{ steps.check.outputs.any_changed }}
    steps:
      - uses: actions/checkout@v6

      - name: Check relevant files
        id: check
        uses: tj-actions/changed-files@v47.0.1
        with:
          files: |
            include/**
            src/**
            cmake/**
            CMakeLists.txt
            script/configure
            python/**
            example_project/**

  library:
    name: Install Library
    needs: [check-changed]
    if: ${{ needs.check-changed.outputs.any_changed == 'true' }}
    strategy:
      matrix:
        os-arch: ["linux-x86_64", "macos-arm64"]
        compiler: ["gcc", "clang", "intelllvm"]
        device: ["cpu", "cuda", "sycl"]
        exclude:
          - os-arch: "macos-arm64"
            device: "cuda"
          - compiler: "clang"
            device: "cuda"
          - os-arch: "macos-arm64"
            device: "sycl"
          - os-arch: "macos-arm64"
            compiler: "intelllvm"
          - compiler: "clang"
            device: "sycl"
          - compiler: "gcc"
            device: "sycl"
          - compiler: "intelllvm"
            device: "cuda"
          - compiler: "intelllvm"
            device: "cpu"
        include:
          - os-arch: "linux-x86_64"
            runs-on: "ubuntu-24.04"
          - os-arch: "macos-arm64"
            runs-on: "macos-15"
          - os-arch: "linux-x86_64"
            compiler: "gcc"
            c-compiler: "/usr/lib/ccache/gcc"
            cxx-compiler: "/usr/lib/ccache/g++"
          - os-arch: "linux-x86_64"
            compiler: "clang"
            c-compiler: "/usr/lib/ccache/clang"
            cxx-compiler: "/usr/lib/ccache/clang++"
          - os-arch: "linux-x86_64"
            compiler: "intelllvm"
            device: "sycl"
            c-compiler: "icx"
            cxx-compiler: "icpx"
          - os-arch: "macos-arm64"
            compiler: "gcc"
            c-compiler: "/opt/homebrew/opt/ccache/libexec/gcc-15"
            cxx-compiler: "/opt/homebrew/opt/ccache/libexec/g++-15"
          - os-arch: "macos-arm64"
            compiler: "clang"
            c-compiler: "/opt/homebrew/opt/ccache/libexec/clang"
            cxx-compiler: "/opt/homebrew/opt/ccache/libexec/clang++"
    runs-on: ${{ matrix.runs-on }}
    env:
      CMAKE_C_COMPILER: ${{ matrix.c-compiler }}
      CMAKE_CXX_COMPILER: ${{ matrix.cxx-compiler }}
      SCALUQ_USE_CUDA: ${{ matrix.device == 'cuda' && 'ON' || 'OFF' }}
      SCALUQ_USE_SYCL: ${{ matrix.device == 'sycl' && 'ON' || 'OFF' }}
      SCALUQ_CPU_NATIVE: "OFF"
      SCALUQ_CUDA_ARCH: "TURING75"
      SCALUQ_FLOAT16: ${{ (matrix.device == 'cpu' || matrix.compiler == 'clang' || matrix.device == 'sycl') && 'OFF' || 'ON' }}
      SCALUQ_FLOAT32: ${{ (matrix.device == 'cpu' || matrix.device == 'sycl') && 'OFF' || 'ON' }}
      SCALUQ_FLOAT64: "ON"
      SCALUQ_BFLOAT16: ${{ (matrix.device == 'cpu' || matrix.compiler == 'clang' || matrix.device == 'sycl') && 'OFF' || 'ON' }}
    steps:
      - name: Free Disk Space (gpu)
        if: ${{ matrix.device == 'cuda' || matrix.device == 'sycl'}}
        run: |
          df -h
          echo "Remove Android library"
          sudo rm -rf /usr/local/lib/android
          echo "Remove .NET runtime"
          sudo rm -rf /usr/share/dotnet
          echo "Remove Haskell runtime"
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/.ghcup
          df -h

      - uses: actions/checkout@v6

      - name: Setup LLVM Clang (macOS clang)
        if: ${{ matrix.os-arch == 'macos-arm64' && matrix.compiler == 'clang' }}
        run: |
          echo "$(brew --prefix llvm@18)/bin" >> "$GITHUB_PATH"
          echo "SDKROOT=$(xcrun --show-sdk-path)" >> "$GITHUB_ENV"

      - name: Install Ninja (Linux)
        if: ${{ matrix.os-arch == 'linux-x86_64' }}
        run: sudo apt update && sudo apt install ninja-build

      - name: Install mold (Linux)
        if: ${{ matrix.os-arch == 'linux-x86_64' }}
        run: sudo apt update && sudo apt install mold

      - name: Install libomp (Linux clang)
        if: ${{ matrix.os-arch == 'linux-x86_64' && matrix.compiler == 'clang' }}
        run: sudo apt update && sudo apt install libomp-dev

      - name: Install libomp (macOS clang)
        if: ${{ matrix.os-arch == 'macos-arm64' && matrix.compiler == 'clang' }}
        run: |
          brew install libomp
          echo "OpenMP_ROOT=$(brew --prefix libomp)" >> "$GITHUB_ENV"

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2.21
        with:
          key: "${{ matrix.os-arch }}-${{ matrix.compiler }}-${{ matrix.device }}"
          verbose: 2

      - name: Install CUDA toolkit
        if: ${{ matrix.device == 'cuda' }}
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: "12.9.1"
          method: "local"
          linux-local-args: '["--toolkit"]'
          log-file-suffix: '${{ github.job }}-${{ matrix.os-arch }}-${{ matrix.device }}'

      - name: Install SYCL toolkit
        if: ${{ matrix.device == 'sycl' }}
        uses: rscohn2/setup-oneapi@v0.2.0
        with:
          components: |
            icx
            dpl

      - name: Show installed Compiler version
        run: |
          if [ "$SCALUQ_USE_CUDA" = 'ON' ]; then
            nvcc --version
          fi
          if [ "$SCALUQ_USE_SYCL" = "ON" ]; then
            source /opt/intel/oneapi/setvars.sh --force
            icpx --version
          fi
          ccache --version
          $CMAKE_C_COMPILER --version
          $CMAKE_CXX_COMPILER --version
          cmake --version
          ninja --version

      - name: Configure
        run: |
          if [ "$SCALUQ_USE_SYCL" = "ON" ]; then
            source /opt/intel/oneapi/setvars.sh --force
          fi
          ./script/configure

      - name: Install to system
        run: |
          if [ "$SCALUQ_USE_SYCL" = "ON" ]; then
            source /opt/intel/oneapi/setvars.sh --force
          fi
          sudo -E env "PATH=$PATH" ninja -C build install

      - name: Build and Run other project
        run: |
          if [ "$SCALUQ_USE_SYCL" = "ON" ]; then
            source /opt/intel/oneapi/setvars.sh --force
          fi
          cd example_project/
          cmake -B build/ -D "CMAKE_C_COMPILER=$CMAKE_C_COMPILER" -D "CMAKE_CXX_COMPILER=$CMAKE_CXX_COMPILER" -D "SCALUQ_USE_CUDA=$SCALUQ_USE_CUDA" -D "SCALUQ_USE_SYCL=$SCALUQ_USE_SYCL"
          make -C build
          if [ "$SCALUQ_USE_CUDA" == 'ON' ]; then
            echo "SKIP"
          else
            build/main
          fi

  python:
    name: Install Python package
    needs: [check-changed]
    if: ${{ needs.check-changed.outputs.any_changed == 'true' }}
    strategy:
      matrix:
        os-arch: ["linux-x86_64", "macos-arm64"]
        compiler: ["gcc", "clang"]
        python-version: ["3.14"]
        include:
          - os-arch: "linux-x86_64"
            runs-on: "ubuntu-24.04"
          - os-arch: "macos-arm64"
            runs-on: "macos-15"
          - os-arch: "linux-x86_64"
            compiler: "gcc"
            c-compiler: "/usr/lib/ccache/gcc"
            cxx-compiler: "/usr/lib/ccache/g++"
          - os-arch: "linux-x86_64"
            compiler: "clang"
            c-compiler: "/usr/lib/ccache/clang"
            cxx-compiler: "/usr/lib/ccache/clang++"
          - os-arch: "macos-arm64"
            compiler: "gcc"
            c-compiler: "/opt/homebrew/opt/ccache/libexec/gcc-15"
            cxx-compiler: "/opt/homebrew/opt/ccache/libexec/g++-15"
          - os-arch: "macos-arm64"
            compiler: "clang"
            c-compiler: "/opt/homebrew/opt/ccache/libexec/clang"
            cxx-compiler: "/opt/homebrew/opt/ccache/libexec/clang++"
    runs-on: ${{ matrix.runs-on }}
    env:
      CMAKE_C_COMPILER: ${{ matrix.c-compiler }}
      CMAKE_CXX_COMPILER: ${{ matrix.cxx-compiler }}
      SCALUQ_USE_CUDA: "OFF"
      SCALUQ_CPU_NATIVE: "OFF"
      SCALUQ_CUDA_ARCH: "TURING75"
      SCALUQ_FLOAT32: "OFF"
      SCALUQ_FLOAT64: "ON"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup LLVM Clang (macOS clang)
        if: ${{ matrix.os-arch == 'macos-arm64' && matrix.compiler == 'clang' }}
        run: |
          echo "$(brew --prefix llvm@18)/bin" >> "$GITHUB_PATH"
          echo "SDKROOT=$(xcrun --show-sdk-path)" >> "$GITHUB_ENV"

      - name: Install libomp (Linux clang)
        if: ${{ matrix.os-arch == 'linux-x86_64' && matrix.compiler == 'clang' }}
        run: sudo apt update && sudo apt install libomp-dev

      - name: Install libomp (macOS clang)
        if: ${{ matrix.os-arch == 'macos-arm64' && matrix.compiler == 'clang' }}
        run: |
          brew install libomp
          echo "OpenMP_ROOT=$(brew --prefix libomp)" >> "$GITHUB_ENV"

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2.21
        with:
          key: "${{ matrix.os-arch }}-${{ matrix.compiler }}-cpu"
          save: false
          verbose: 2

      - name: Show installed Compiler version
        run: |
          ccache --version
          $CMAKE_C_COMPILER --version
          $CMAKE_CXX_COMPILER --version

      - name: Install mypy
        run: python -m pip install mypy

      - name: Install to system
        run: python -m pip install .

      - name: Run / Test stub
        run: |
          echo -e "from scaluq import StateVector, gate\nstate = StateVector(2)\nx = gate.X(0)\nx.update_quantum_state(state)\nprint(state.get_amplitudes())" > /tmp/sample.py
          python /tmp/sample.py
          python -m mypy /tmp/sample.py

      - name: Run doctest
        run: |
          ( set -o pipefail; python python_test/run_doctest.py | tee /tmp/doctest.log )
          ! grep -q "Failed" /tmp/doctest.log

  install-checks-passed:
    name: Install Checks Passed
    needs: [check-changed, library, python]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: All checks passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            exit 1
          fi
