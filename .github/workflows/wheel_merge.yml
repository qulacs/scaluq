name: Wheel build

on:
  merge_group:
  push:
    branches:
      - main  # For badge updates only. Actual checks are done via merge queue.
  workflow_dispatch:

jobs:
  wheel-build:
    name: Python wheel build
    strategy:
      fail-fast: false
      matrix:
        os: ["linux", "macos"]
        arch: ["x86_64", "arm64"]
        cibw-python: ["cp310", "cp311", "cp312", "cp313", "cp314"]
        exclude:
          # currently ARM runner is not supported
          - os: "linux"
            arch: "arm64"
        include:
          - os: "linux"
            arch: "x86_64"
            runs-on: "ubuntu-24.04"
            cibw-os-arch: "manylinux_x86_64"
          - os: "macos"
            arch: "x86_64"
            runs-on: "macos-15-intel"
            cibw-os-arch: "macosx_x86_64"
          - os: "macos"
            arch: "arm64"
            runs-on: "macos-15"
            cibw-os-arch: "macosx_arm64"
    runs-on: ${{ matrix.runs-on }}
    env:
      CMAKE_C_COMPILER: ${{ matrix.runs-on == 'macos-15-intel' && '/usr/local/opt/ccache/libexec/gcc-15' || (matrix.runs-on == 'macos-15' && '/opt/homebrew/opt/ccache/libexec/gcc-15' || '/usr/lib/ccache/gcc') }}
      CMAKE_CXX_COMPILER: ${{ matrix.runs-on == 'macos-15-intel' && '/usr/local/opt/ccache/libexec/g++-15' || (matrix.runs-on == 'macos-15' && '/opt/homebrew/opt/ccache/libexec/g++-15' || '/usr/lib/ccache/g++') }}
      SCALUQ_CPU_NATIVE: 'OFF'
      CIBW_ARCHS: ${{ matrix.arch }}
      CIBW_BUILD: ${{ matrix.cibw-python }}-${{ matrix.cibw-os-arch }}
      CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
      CIBW_MANYLINUX_AARCH64_IMAGE: manylinux_2_28
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.os == 'macos' && '15.0' || '' }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2.21
        with:
          key: "${{ matrix.os }}-${{ matrix.arch }}-${{ matrix.runs-on }}"
          save: false
          verbose: 2

      - name: Install Python dependencies
        run: python -m pip install cibuildwheel

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheels

      - name: Upload wheel to GitHub
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.cibw-python }}-${{ matrix.cibw-os-arch }}
          path: ./wheels/*.whl

  wheel-build-passed:
    name: Wheel Build Passed
    needs: [wheel-build]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: All checks passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            exit 1
          fi

  upload-to-pypi:
    name: Upload to PyPI
    needs: wheel-build
    strategy:
      fail-fast: false
      matrix:
        os: ["linux", "macos"]
        arch: ["x86_64", "arm64"]
        exclude:
          # currently ARM runner is not supported
          - os: "linux"
            arch: "arm64"
        include:
          - os: "linux"
            arch: "x86_64"
            runs-on: "ubuntu-24.04"
            cibw-os-arch: "manylinux_x86_64"
          - os: "macos"
            arch: "x86_64"
            runs-on: "macos-15"
            cibw-os-arch: "macosx_x86_64"
          - os: "macos"
            arch: "arm64"
            runs-on: "macos-14"
            cibw-os-arch: "macosx_arm64"
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: python -m pip install twine

      - uses: actions/download-artifact@v4
        with:
          name: cp310-${{ matrix.cibw-os-arch }}
          path: ./cp310
      - uses: actions/download-artifact@v4
        with:
          name: cp311-${{ matrix.cibw-os-arch }}
          path: ./cp311
      - uses: actions/download-artifact@v4
        with:
          name: cp312-${{ matrix.cibw-os-arch }}
          path: ./cp312
      - uses: actions/download-artifact@v4
        with:
          name: cp313-${{ matrix.cibw-os-arch }}
          path: ./cp313
      - uses: actions/download-artifact@v4
        with:
          name: cp314-${{ matrix.cibw-os-arch }}
          path: ./cp314

      - name: Upload wheel data to PyPI if the Git tag is set
        run: for path in cp39 cp310 cp311 cp312 cp313; do python -m twine upload --skip-existing $path/*.whl; done
        if: ${{ contains(github.ref, 'tags/') }}
        env:
          TWINE_USERNAME: "__token__"
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN_SCALUQ }}

      - name: Upload wheel data to TestPyPI when workflow_dispatch
        run: for path in cp39 cp310 cp311 cp312 cp313; do python -m twine upload --repository testpypi --skip-existing $path/*.whl; done
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          TWINE_USERNAME: "__token__"
          TWINE_PASSWORD: ${{ secrets.TESTPYPI_TOKEN_SCALUQ }}
