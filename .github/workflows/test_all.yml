name: Test All

on:
  merge_group:
  push:
    branches:
      - main  # For badge updates only. Actual checks are done via merge queue.
  workflow_dispatch:

jobs:
  test:
    name: C++ Build and Test
    strategy:
      matrix:
        os-arch: ["linux-x86_64", "macos-arm64"]
        compiler: ["gcc", "clang", "intelllvm"]
        device: ["cpu", "cuda", "sycl"]
        exclude:
          - os-arch: "macos-arm64"
            device: "cuda"
          - compiler: "clang"
            device: "cuda"
          - os-arch: "macos-arm64"
            device: "sycl"
          - os-arch: "macos-arm64"
            compiler: "intelllvm"
          - compiler: "clang"
            device: "sycl"
          - compiler: "gcc"
            device: "sycl"
          - compiler: "intelllvm"
            device: "cuda"
          - compiler: "intelllvm"
            device: "cpu"
        include:
          - os-arch: "linux-x86_64"
            runs-on: "ubuntu-24.04"
          - os-arch: "macos-arm64"
            runs-on: "macos-15"
          - os-arch: "linux-x86_64"
            compiler: "gcc"
            c-compiler: "/usr/lib/ccache/gcc"
            cxx-compiler: "/usr/lib/ccache/g++"
          - os-arch: "linux-x86_64"
            compiler: "clang"
            c-compiler: "/usr/lib/ccache/clang"
            cxx-compiler: "/usr/lib/ccache/clang++"
          - os-arch: "linux-x86_64"
            compiler: "intelllvm"
            device: "sycl"
            c-compiler: "icx"
            cxx-compiler: "icpx"
          - os-arch: "macos-arm64"
            compiler: "gcc"
            c-compiler: "/opt/homebrew/opt/ccache/libexec/gcc-15"
            cxx-compiler: "/opt/homebrew/opt/ccache/libexec/g++-15"
          - os-arch: "macos-arm64"
            compiler: "clang"
            c-compiler: "/opt/homebrew/opt/ccache/libexec/clang"
            cxx-compiler: "/opt/homebrew/opt/ccache/libexec/clang++"
    runs-on: ${{ matrix.runs-on }}
    env:
      CMAKE_C_COMPILER: ${{ matrix.c-compiler }}
      CMAKE_CXX_COMPILER: ${{ matrix.cxx-compiler }}
      CMAKE_BUILD_TYPE: ${{ (matrix.device == 'cuda' || matrix.device == 'sycl') || 'Debug' }}
      SCALUQ_USE_TEST: "ON"
      SCALUQ_USE_CUDA: ${{ matrix.device == 'cuda' && 'ON' || 'OFF' }}
      SCALUQ_USE_SYCL: ${{ matrix.device == 'sycl' && 'ON' || 'OFF' }}
      SCALUQ_CPU_NATIVE: "OFF"
      SCALUQ_CUDA_ARCH: "TURING75"
      SCALUQ_FLOAT16: ${{ (matrix.compiler == 'clang' || matrix.device == 'sycl') && 'OFF' || 'ON' }}
      SCALUQ_FLOAT32: ${{ matrix.device == 'sycl' && 'OFF' || 'ON' }}
      SCALUQ_FLOAT64: "ON"
      SCALUQ_BFLOAT16: ${{ (matrix.compiler == 'clang' || matrix.device == 'sycl') && 'OFF' || 'ON' }}
    steps:
      - name: Free Disk Space (gpu)
        if: ${{ matrix.device == 'cuda' || matrix.device == 'sycl' }}
        run: |
          df -h
          echo "Remove Android library"
          sudo rm -rf /usr/local/lib/android
          echo "Remove .NET runtime"
          sudo rm -rf /usr/share/dotnet
          echo "Remove Haskell runtime"
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/.ghcup
          df -h

      - uses: actions/checkout@v6

      - name: Setup LLVM Clang (macOS clang)
        if: ${{ matrix.os-arch == 'macos-arm64' && matrix.compiler == 'clang' }}
        run: |
          echo "$(brew --prefix llvm@18)/bin" >> "$GITHUB_PATH"
          echo "SDKROOT=$(xcrun --show-sdk-path)" >> "$GITHUB_ENV"

      - name: Install Ninja (Linux)
        if: ${{ matrix.os-arch == 'linux-x86_64' }}
        run: sudo apt update && sudo apt install ninja-build

      - name: Install mold (Linux)
        if: ${{ matrix.os-arch == 'linux-x86_64' }}
        run: sudo apt update && sudo apt install mold

      - name: Install libomp (Linux clang)
        if: ${{ matrix.os-arch == 'linux-x86_64' && matrix.compiler == 'clang' }}
        run: sudo apt update && sudo apt install libomp-dev

      - name: Install libomp (macOS clang)
        if: ${{ matrix.os-arch == 'macos-arm64' && matrix.compiler == 'clang' }}
        run: |
          brew install libomp
          echo "OpenMP_ROOT=$(brew --prefix libomp)" >> "$GITHUB_ENV"

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2.21
        with:
          key: "${{ matrix.os-arch }}-${{ matrix.compiler }}-${{ matrix.device }}"
          verbose: 2

      - name: Install CUDA toolkit
        if: ${{ matrix.device == 'cuda' }}
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: "12.9.1"
          method: "local"
          linux-local-args: '["--toolkit"]'
          log-file-suffix: '${{ github.job }}-${{ matrix.os-arch }}-${{ matrix.device }}'

      - name: Install SYCL toolkit
        if: ${{ matrix.device == 'sycl' }}
        uses: rscohn2/setup-oneapi@v0.2.0
        with:
          components: |
            icx
            dpl

      - name: Show installed Compiler version
        run: |
          if [ "$SCALUQ_USE_CUDA" = 'ON' ]; then
            nvcc --version
          fi
          if [ "$SCALUQ_USE_SYCL" = "ON" ]; then
            source /opt/intel/oneapi/setvars.sh --force
            icpx --version
          fi
          ccache --version
          $CMAKE_C_COMPILER --version
          $CMAKE_CXX_COMPILER --version
          cmake --version
          ninja --version

      - name: Configure & Build
        run: |
          if [ "$SCALUQ_USE_SYCL" = "ON" ]; then
            source /opt/intel/oneapi/setvars.sh --force
          fi
          ./script/configure
          ninja -C build/

      - name: Test
        if: ${{ matrix.device == 'cpu' }}  # currently GPU runner is not supported
        run: |
          if [ "$(uname)" == 'Darwin' ]; then
            NPROC=$(sysctl -n hw.physicalcpu)
          else
            NPROC=$(nproc)
          fi
          OMP_PROC_BIND=false ctest --test-dir build/ -j "${NPROC}" --output-on-failure

  cpp-tests-passed:
    name: C++ Tests Passed
    needs: [test]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: All checks passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            exit 1
          fi
